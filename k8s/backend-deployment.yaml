apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: fingrid-dashboard
  labels:
    app: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/aliipou/fingrid-dashboard/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: FINGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fingrid-secrets
                  key: FINGRID_API_KEY
            - name: ENTSOE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fingrid-secrets
                  key: ENTSOE_API_KEY
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: fingrid-secrets
                  key: SECRET_KEY
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fingrid-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379"
          envFrom:
            - configMapRef:
                name: fingrid-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
