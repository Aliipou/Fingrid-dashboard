apiVersion: v1
kind: Secret
metadata:
  name: fingrid-secrets
  namespace: fingrid-dashboard
type: Opaque
stringData:
  FINGRID_API_KEY: "your_fingrid_api_key_here"
  ENTSOE_API_KEY: "your_entsoe_api_key_here"
  SECRET_KEY: "your_256_bit_secret_key_for_jwt_here"
  REDIS_PASSWORD: "your_redis_password_here"