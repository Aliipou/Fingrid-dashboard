<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Real-time Finnish energy data dashboard powered by Fingrid Open Data API"
    />
    <meta name="keywords" content="Finland, energy, electricity, dashboard, Fingrid, real-time" />
    <meta name="author" content="Fingrid Dashboard Team" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fingrid-dashboard.example.com/" />
    <meta property="og:title" content="Fingrid Energy Dashboard" />
    <meta property="og:description" content="Real-time Finnish energy data monitoring and analytics" />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://fingrid-dashboard.example.com/" />
    <meta property="twitter:title" content="Fingrid Energy Dashboard" />
    <meta property="twitter:description" content="Real-time Finnish energy data monitoring and analytics" />
    <meta property="twitter:image" content="%PUBLIC_URL%/twitter-image.png" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Preconnect to external domains for better performance -->
    <link rel="preconnect" href="https://api.fingrid.fi" />
    <link rel="preconnect" href="https://web-api.tp.entsoe.eu" />
    
    <!-- DNS prefetch for faster API calls -->
    <link rel="dns-prefetch" href="//api.fingrid.fi" />
    <link rel="dns-prefetch" href="//web-api.tp.entsoe.eu" />
    
    <title>Fingrid Energy Dashboard - Real-time Finnish Energy Data</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('%PUBLIC_URL%/sw.js')
            .then(function(registration) {
              console.log('SW registered: ', registration);
            })
            .catch(function(registrationError) {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </body>
</html>
